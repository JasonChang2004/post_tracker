name: Threads Monitor Bot

on:
  # 每小時執行一次
  schedule:
    - cron: '17 * * * *'  # 每小時的第 17 分鐘
  
  # 也可以手動觸發
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # 需要寫入權限以便提交 state.json
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: Run monitor bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python app.py
      
      - name: Commit state changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update state.json [skip ci]"
          
          # 推送時加入重試機制（最多重試 3 次）
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Push attempt $attempt of $max_attempts..."
            if git push; then
              echo "Push successful!"
              break
            else
              if [ $attempt -eq $max_attempts ]; then
                echo "Push failed after $max_attempts attempts"
                exit 1
              fi
              echo "Push failed, waiting 10 seconds before retry..."
              sleep 10
              attempt=$((attempt + 1))
            fi
          done
      
      - name: Upload state file (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-data
          path: data/state.json
          retention-days: 7
